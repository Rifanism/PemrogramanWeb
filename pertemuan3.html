<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rif'an Habibi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="nav-bar">
        <a href="index.html" id="nav-menu">Dashboard</a>
        <a href="#" id="nav-menu">Profile</a>
        <a href="#" id="nav-menu">Settings</a>
    </nav>

    <form id="form-input" action="#" method="post" target="_self">
        <h3 id="title-form">Form Kehadiran Praktikan</h3>

        <label>Nama</label><br>
        <input type="text" placeholder="Masukkan Nama"><br>
        
        <label>NPM</label><br>
        <input type="number" placeholder="Masukkan NPM"><br>
        
        <label>Kelas</label><br>
        <select name="prodi" id="prodi">
            <option>S1 - Sistem Informasi</option>
            <option>S1 - Ilmu Komputer</option>
            <option>D3 - Manajemen Informatika</option>
        </select>
        <br>
        
        <label>Tanggal</label><br>
        <input type="date"><br>
        
        <label>Waktu</label><br>
        <input type="time"><br>
        
        <input type="submit" id="submit-btn">
    </form>
</body>
</html>
